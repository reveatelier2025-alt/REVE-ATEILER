<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>REVE Atelier</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Times New Roman", serif;
      background: #111;
      color: white;
    }

    .hero {
      position: relative;
      width: 100%;
      height: 100vh;
      overflow: hidden;
    }

    .slide {
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 1.2s ease;
    }

    .slide.active {
      opacity: 1;
      z-index: 1;
    }

    .slide img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .slide::after {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.25);
      z-index: 1;
    }

    header {
      position: absolute;
      top: 38px;
      left: 6%;
      right: 6%;
      z-index: 5;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-family: Arial, sans-serif;
      letter-spacing: 14px;
      font-size: 20px;
      font-weight: 600;
    }

    nav a {
      color: white;
      text-decoration: none;
      margin-left: 32px;
      font-size: 18px;
    }

    .content {
      position: absolute;
      left: 6%;
      top: 45%;
      transform: translateY(-50%);
      z-index: 5;
    }

    .content h1 {
      font-family: Arial, sans-serif;
      font-size: clamp(48px, 7vw, 110px);
      letter-spacing: 22px;
      font-weight: 500;
      margin-bottom: 45px;
    }

    .content p {
      font-family: Arial, sans-serif;
      letter-spacing: 10px;
      font-size: 18px;
      text-transform: uppercase;
    }

    .date {
      position: absolute;
      left: 6%;
      bottom: 7%;
      z-index: 5;
      font-size: 20px;
    }

    .dots {
      position: absolute;
      right: 7%;
      bottom: 7%;
      z-index: 5;
      display: flex;
      gap: 14px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.45);
      cursor: pointer;
    }

    .dot.active {
      background: white;
    }

    @media (max-width: 768px) {
      header {
        top: 24px;
      }

      nav {
        display: none;
      }

      .logo {
        font-size: 16px;
        letter-spacing: 8px;
      }

      .content h1 {
        font-size: 42px;
        letter-spacing: 10px;
      }

      .content p {
        letter-spacing: 5px;
        font-size: 14px;
      }
    }
  </style>
</head>

<body>

<section class="hero">

  <header>
    <div class="logo">REVE</div>
    <nav>
      <a href="#">Courses</a>
      <a href="#">Works</a>
      <a href="#">About</a>
      <a href="#">Contact</a>
    </nav>
  </header>

  <div class="slide active">
    <img src="images/P4114103.jpg" alt="REVE Atelier">
    <div class="content">
      <h1>REVE ATELIER</h1>
      <p>Painting as a quiet practice</p>
    </div>
    <div class="date">Banqiao｜Creative Art Studio</div>
  </div>

  <div class="slide">
    <img src="images/IMG_7059-03.png" alt="Painting Class">
    <div class="content">
      <h1>ART CLASS</h1>
      <p>A moment to slow down</p>
    </div>
    <div class="date">Experience Course｜Now Open</div>
  </div>

  <div class="slide">
    <img src="images/IMG_7059-02.png" alt="Student Works">
    <div class="content">
      <h1>WORKSHOP</h1>
      <p>Texture · Acrylic · Alcohol Ink</p>
    </div>
    <div class="date">Book via LINE</div>
  </div>

  <div class="dots">
    <div class="dot active" onclick="goToSlide(0)"></div>
    <div class="dot" onclick="goToSlide(1)"></div>
    <div class="dot" onclick="goToSlide(2)"></div>
  </div>

</section>

<script>
  const slides = document.querySelectorAll(".slide");
  const dots = document.querySelectorAll(".dot");
  let current = 0;

  function showSlide(index) {
    slides.forEach(slide => slide.classList.remove("active"));
    dots.forEach(dot => dot.classList.remove("active"));

    slides[index].classList.add("active");
    dots[index].classList.add("active");
    current = index;
  }

  function nextSlide() {
    let next = (current + 1) % slides.length;
    showSlide(next);
  }

  function goToSlide(index) {
    showSlide(index);
  }

  setInterval(nextSlide, 5000);
</script>

</body>
</html>
